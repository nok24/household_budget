name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck / Lint / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        # ビルド時に環境変数が無いと undefined になるが、static replace されるだけで失敗はしない。
        # CI では Drive APIに繋がない前提（クライアント実行時に必要なだけ）。
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ci-placeholder.apps.googleusercontent.com
          VITE_GOOGLE_API_KEY: ci-placeholder
          VITE_ALLOWED_EMAILS: ci@example.com
