<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>家計簿アプリ — デザイン提案</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif; }
  * { box-sizing: border-box; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data/mock.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/charts.jsx"></script>
<script type="text/babel" src="variants/variant-a.jsx"></script>
<script type="text/babel" src="variants/variant-b.jsx"></script>
<script type="text/babel" src="variants/variant-c.jsx"></script>
<script type="text/babel" src="screens/transactions.jsx"></script>
<script type="text/babel" src="screens/report.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="dashboard"
          title="ダッシュボード"
          subtitle="2人で共有する家計簿のメイン画面 — CSVから取り込んだ収支データの俯瞰。3つの方向性で比較。"
        >
          <DCArtboard id="a" label="A · 王道3カラム / 深緑" width={1280} height={880}>
            <VariantADashboard />
          </DCArtboard>
          <DCArtboard id="b" label="B · 数値ファースト / 朱赤" width={1280} height={880}>
            <VariantBDashboard />
          </DCArtboard>
          <DCArtboard id="c" label="C · タイムライン / 紺青" width={1280} height={880}>
            <VariantCDashboard />
          </DCArtboard>
        </DCSection>

        <DCSection
          id="other-screens"
          title="その他の画面"
          subtitle="採用方向性 (A) を踏まえた取引一覧・カテゴリレポート画面。"
        >
          <DCArtboard id="tx" label="取引一覧" width={1280} height={880}>
            <TransactionsScreen />
          </DCArtboard>
          <DCArtboard id="report" label="カテゴリ別レポート" width={1280} height={880}>
            <ReportScreen />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
